<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <title>Direction 1: The Join — README Banner</title>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg1)"/>

  <!-- Subtle grid pattern background -->
  <g opacity="0.06">
    <line x1="0" y1="40" x2="1280" y2="40" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1280" y2="200" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="1280" y2="280" stroke="#10b981" stroke-width="0.5"/>
  </g>

  <!-- Large mark on left -->
  <g transform="translate(80, 60) scale(3)">
    <line x1="4" y1="14" x2="20" y2="26" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="32" x2="20" y2="32" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="50" x2="20" y2="38" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="4" cy="14" r="2.5" fill="#64748b"/>
    <circle cx="4" cy="32" r="2.5" fill="#64748b"/>
    <circle cx="4" cy="50" r="2.5" fill="#64748b"/>
    <rect x="20" y="23" width="18" height="18" rx="2.5" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="26" y1="23" x2="26" y2="41" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="32" y1="23" x2="32" y2="41" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="20" y1="29" x2="38" y2="29" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="20" y1="35" x2="38" y2="35" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="38" y1="32" x2="58" y2="32" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="45" y1="28" x2="45" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
    <line x1="50" y1="28" x2="50" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
    <line x1="55" y1="28" x2="55" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
  </g>

  <!-- Title text -->
  <text x="380" y="135" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace" font-size="42" fill="#e2e8f0" font-weight="600" letter-spacing="-1">market-data-bridge</text>

  <!-- Tagline -->
  <text x="380" y="175" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace" font-size="16" fill="#64748b" letter-spacing="0.5">Connect IBKR + Yahoo Finance to Claude &amp; ChatGPT</text>

  <!-- Feature pills -->
  <g transform="translate(380, 200)">
    <rect x="0" y="0" width="100" height="28" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
    <text x="50" y="18" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#10b981">56 MCP tools</text>

    <rect x="112" y="0" width="100" height="28" rx="4" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="162" y="18" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#8b5cf6">3-model eval</text>

    <rect x="224" y="0" width="110" height="28" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="279" y="18" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#f59e0b">REST + OpenAPI</text>

    <rect x="346" y="0" width="120" height="28" rx="4" fill="#64748b" fill-opacity="0.1" stroke="#64748b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="406" y="18" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#94a3b8">trade execution</text>
  </g>

  <!-- Architecture mini-diagram on right -->
  <g transform="translate(900, 80)" opacity="0.4">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#64748b">Yahoo ──┐</text>
    <text x="0" y="18" font-family="monospace" font-size="11" fill="#64748b">IBKR ───┼─→ Bridge ─→ MCP</text>
    <text x="0" y="36" font-family="monospace" font-size="11" fill="#64748b">CSV ────┘           ─→ REST</text>
    <text x="0" y="66" font-family="monospace" font-size="11" fill="#64748b">        Eval Engine</text>
    <text x="0" y="84" font-family="monospace" font-size="11" fill="#64748b">        ├─ Claude</text>
    <text x="0" y="102" font-family="monospace" font-size="11" fill="#64748b">        ├─ GPT-4o</text>
    <text x="0" y="120" font-family="monospace" font-size="11" fill="#64748b">        └─ Gemini</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="314" width="1280" height="6" fill="#10b981" opacity="0.6"/>
</svg>
