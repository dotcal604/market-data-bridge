<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Direction 2: The Ensemble Grid — Social/OG Card</title>
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Large grid mark -->
  <g transform="translate(100, 120) scale(5.5)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="40" width="16" height="16" rx="2.5" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="20" y="40" width="16" height="16" rx="2.5" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="40" y="40" width="16" height="16" rx="2.5" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="#10b981" opacity="0.7"/>
    <circle cx="28" cy="8" r="3" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="48" cy="8" r="3" fill="#f59e0b" opacity="0.7"/>
    <circle cx="8" cy="28" r="3.5" fill="#10b981" opacity="0.5"/>
    <circle cx="28" cy="28" r="3" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="48" cy="28" r="4" fill="#f59e0b" opacity="0.5"/>
    <circle cx="8" cy="48" r="3.5" fill="#10b981"/>
    <circle cx="28" cy="48" r="3.5" fill="#10b981"/>
    <circle cx="48" cy="48" r="3.5" fill="#10b981"/>
  </g>

  <!-- Title -->
  <text x="530" y="260" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="54" fill="#e2e8f0" font-weight="600" letter-spacing="-1.5">market-data-bridge</text>

  <!-- Tagline -->
  <text x="530" y="310" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="20" fill="#64748b">Connect brokerage data to AI assistants</text>

  <!-- Feature line -->
  <text x="530" y="360" font-family="monospace" font-size="16" fill="#10b981">MCP + REST</text>
  <text x="650" y="360" font-family="monospace" font-size="16" fill="#64748b">·</text>
  <text x="668" y="360" font-family="monospace" font-size="16" fill="#8b5cf6">3-model eval</text>
  <text x="810" y="360" font-family="monospace" font-size="16" fill="#64748b">·</text>
  <text x="828" y="360" font-family="monospace" font-size="16" fill="#f59e0b">56 tools</text>
  <text x="930" y="360" font-family="monospace" font-size="16" fill="#64748b">·</text>
  <text x="948" y="360" font-family="monospace" font-size="16" fill="#94a3b8">IBKR + Yahoo</text>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#10b981" opacity="0.5"/>
