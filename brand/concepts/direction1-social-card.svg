<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Direction 1: The Join — Social/OG Card</title>
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle horizontal grid lines -->
  <g opacity="0.04">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#10b981" stroke-width="1"/>
  </g>

  <!-- Large mark centered -->
  <g transform="translate(100, 140) scale(5)">
    <line x1="4" y1="14" x2="20" y2="26" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="32" x2="20" y2="32" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="50" x2="20" y2="38" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="4" cy="14" r="2.5" fill="#64748b"/>
    <circle cx="4" cy="32" r="2.5" fill="#64748b"/>
    <circle cx="4" cy="50" r="2.5" fill="#64748b"/>
    <rect x="20" y="23" width="18" height="18" rx="2.5" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="26" y1="23" x2="26" y2="41" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="32" y1="23" x2="32" y2="41" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="20" y1="29" x2="38" y2="29" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="20" y1="35" x2="38" y2="35" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="38" y1="32" x2="58" y2="32" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="45" y1="28" x2="45" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
    <line x1="50" y1="28" x2="50" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
    <line x1="55" y1="28" x2="55" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
  </g>

  <!-- Title -->
  <text x="530" y="260" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="54" fill="#e2e8f0" font-weight="600" letter-spacing="-1.5">market-data-bridge</text>

  <!-- Tagline -->
  <text x="530" y="310" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="20" fill="#64748b">Connect brokerage data to AI assistants</text>

  <!-- Feature line -->
  <text x="530" y="360" font-family="monospace" font-size="16" fill="#10b981">MCP + REST</text>
  <text x="650" y="360" font-family="monospace" font-size="16" fill="#64748b">·</text>
  <text x="668" y="360" font-family="monospace" font-size="16" fill="#8b5cf6">3-model eval</text>
  <text x="810" y="360" font-family="monospace" font-size="16" fill="#64748b">·</text>
  <text x="828" y="360" font-family="monospace" font-size="16" fill="#f59e0b">56 tools</text>
  <text x="930" y="360" font-family="monospace" font-size="16" fill="#64748b">·</text>
  <text x="948" y="360" font-family="monospace" font-size="16" fill="#94a3b8">IBKR + Yahoo</text>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#10b981" opacity="0.5"/>
