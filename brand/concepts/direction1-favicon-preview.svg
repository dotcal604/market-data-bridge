<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <title>Direction 1: Favicon size test — 16, 32, 48, 64</title>
  <rect width="400" height="120" fill="#0f172a" rx="4"/>
  <text x="20" y="20" font-family="monospace" font-size="10" fill="#64748b">Direction 1: The Join — Favicon sizes</text>

  <!-- 16x16 -->
  <rect x="20" y="35" width="16" height="16" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <g transform="translate(20, 35) scale(0.25)">
    <line x1="4" y1="14" x2="20" y2="26" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <line x1="4" y1="32" x2="20" y2="32" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <line x1="4" y1="50" x2="20" y2="38" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <rect x="20" y="23" width="18" height="18" rx="3" fill="none" stroke="#10b981" stroke-width="4"/>
    <line x1="38" y1="32" x2="58" y2="32" stroke="#10b981" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text x="28" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">16px</text>

  <!-- 32x32 -->
  <rect x="70" y="27" width="32" height="32" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <g transform="translate(70, 27) scale(0.5)">
    <line x1="4" y1="14" x2="20" y2="26" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <line x1="4" y1="32" x2="20" y2="32" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <line x1="4" y1="50" x2="20" y2="38" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <circle cx="4" cy="14" r="3" fill="#64748b"/>
    <circle cx="4" cy="32" r="3" fill="#64748b"/>
    <circle cx="4" cy="50" r="3" fill="#64748b"/>
    <rect x="20" y="23" width="18" height="18" rx="3" fill="none" stroke="#10b981" stroke-width="3"/>
    <line x1="38" y1="32" x2="58" y2="32" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="86" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">32px</text>

  <!-- 48x48 -->
  <rect x="130" y="19" width="48" height="48" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <g transform="translate(130, 19) scale(0.75)">
    <line x1="4" y1="14" x2="20" y2="26" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="32" x2="20" y2="32" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="50" x2="20" y2="38" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="4" cy="14" r="2.5" fill="#64748b"/>
    <circle cx="4" cy="32" r="2.5" fill="#64748b"/>
    <circle cx="4" cy="50" r="2.5" fill="#64748b"/>
    <rect x="20" y="23" width="18" height="18" rx="2.5" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="26" y1="23" x2="26" y2="41" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="32" y1="23" x2="32" y2="41" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="20" y1="29" x2="38" y2="29" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="20" y1="35" x2="38" y2="35" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="38" y1="32" x2="58" y2="32" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="45" y1="28" x2="45" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
    <line x1="50" y1="28" x2="50" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
    <line x1="55" y1="28" x2="55" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
  </g>
  <text x="154" y="84" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">48px</text>

  <!-- 64x64 -->
  <rect x="210" y="11" width="64" height="64" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <g transform="translate(210, 11)">
    <line x1="4" y1="14" x2="20" y2="26" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="32" x2="20" y2="32" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="50" x2="20" y2="38" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="4" cy="14" r="2.5" fill="#64748b"/>
    <circle cx="4" cy="32" r="2.5" fill="#64748b"/>
    <circle cx="4" cy="50" r="2.5" fill="#64748b"/>
    <rect x="20" y="23" width="18" height="18" rx="2.5" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="26" y1="23" x2="26" y2="41" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="32" y1="23" x2="32" y2="41" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="20" y1="29" x2="38" y2="29" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="20" y1="35" x2="38" y2="35" stroke="#10b981" stroke-width="0.75" opacity="0.5"/>
    <line x1="38" y1="32" x2="58" y2="32" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="45" y1="28" x2="45" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
    <line x1="50" y1="28" x2="50" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
    <line x1="55" y1="28" x2="55" y2="36" stroke="#e2e8f0" stroke-width="1.25"/>
  </g>
  <text x="242" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">64px</text>

  <!-- Assessment -->
  <text x="310" y="40" font-family="monospace" font-size="10" fill="#94a3b8">16px: ⚠ grid detail lost,</text>
  <text x="310" y="55" font-family="monospace" font-size="10" fill="#94a3b8">convergence readable</text>
  <text x="310" y="75" font-family="monospace" font-size="10" fill="#10b981">32px: ✓ clear</text>
  <text x="310" y="90" font-family="monospace" font-size="10" fill="#10b981">48px+: ✓ full detail</text>
</svg>
