<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <title>Concept B3: Multi-Rung — Two bars with three connecting rungs</title>
  <rect width="120" height="120" fill="none"/>
  <!-- Left vertical bar -->
  <rect x="20" y="20" width="8" height="80" rx="2" fill="#e2e8f0"/>
  <!-- Right vertical bar -->
  <rect x="92" y="20" width="8" height="80" rx="2" fill="#e2e8f0"/>
  <!-- Three horizontal rungs (data channels) -->
  <rect x="28" y="33" width="64" height="6" rx="1.5" fill="#10b981" opacity="0.6"/>
  <rect x="28" y="57" width="64" height="6" rx="1.5" fill="#10b981"/>
  <rect x="28" y="81" width="64" height="6" rx="1.5" fill="#10b981" opacity="0.6"/>
  <!-- Small data dots along center rung -->
  <circle cx="42" cy="60" r="2" fill="#0f172a"/>
  <circle cx="54" cy="60" r="2" fill="#0f172a"/>
  <circle cx="66" cy="60" r="2" fill="#0f172a"/>
  <circle cx="78" cy="60" r="2" fill="#0f172a"/>
</svg>
