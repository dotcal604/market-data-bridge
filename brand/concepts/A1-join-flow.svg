<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <title>Concept A1: The Join — Three streams merging to one</title>
  <!-- Three input lines converging through a grid node to a single output -->
  <rect width="120" height="120" fill="none"/>
  <!-- Three input streams -->
  <line x1="10" y1="30" x2="45" y2="52" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="60" x2="45" y2="60" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="90" x2="45" y2="68" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <!-- Bridge node (the join point) -->
  <rect x="45" y="48" width="24" height="24" rx="3" fill="none" stroke="#e2e8f0" stroke-width="2.5"/>
  <!-- Internal grid lines in the node -->
  <line x1="53" y1="48" x2="53" y2="72" stroke="#64748b" stroke-width="1"/>
  <line x1="61" y1="48" x2="61" y2="72" stroke="#64748b" stroke-width="1"/>
  <line x1="45" y1="56" x2="69" y2="56" stroke="#64748b" stroke-width="1"/>
  <line x1="45" y1="64" x2="69" y2="64" stroke="#64748b" stroke-width="1"/>
  <!-- Output line (enriched — thicker) -->
  <line x1="69" y1="60" x2="110" y2="60" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>
  <!-- Tick marks on output showing enrichment -->
  <line x1="80" y1="55" x2="80" y2="65" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="88" y1="55" x2="88" y2="65" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="96" y1="55" x2="96" y2="65" stroke="#e2e8f0" stroke-width="1.5"/>
</svg>
