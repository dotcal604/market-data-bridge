<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <title>Concept Comparison Board — All directions side by side</title>
  <defs>
    <style>
      .label { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; fill: #94a3b8; font-size: 11px; }
      .title { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; fill: #e2e8f0; font-size: 13px; font-weight: 600; }
      .verdict { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; fill: #10b981; font-size: 10px; }
      .reject { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; fill: #ef4444; font-size: 10px; }
    </style>
  </defs>
  <rect width="960" height="500" fill="#0f172a" rx="8"/>

  <!-- Header -->
  <text x="480" y="30" text-anchor="middle" class="title" font-size="16">market-data-bridge — Concept Directions</text>

  <!-- Row 1: Concept A -->
  <text x="20" y="65" class="title">A: The Join</text>
  <!-- A1 -->
  <rect x="20" y="75" width="90" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <line x1="30" y1="100" x2="55" y2="113" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="120" x2="55" y2="120" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="140" x2="55" y2="127" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <rect x="55" y="110" width="16" height="20" rx="2" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="71" y1="120" x2="100" y2="120" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <text x="65" y="155" text-anchor="middle" class="label">A1: Flow</text>

  <!-- A2 -->
  <rect x="125" y="75" width="90" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="135" y="85" width="8" height="60" rx="1" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <rect x="150" y="85" width="8" height="60" rx="1" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <rect x="165" y="85" width="8" height="60" rx="1" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <rect x="132" y="108" width="44" height="10" rx="1" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <line x1="176" y1="113" x2="195" y2="113" stroke="#10b981" stroke-width="2"/>
  <rect x="195" y="85" width="12" height="60" rx="1" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="170" y="155" text-anchor="middle" class="label">A2: Schema</text>

  <!-- A3 -->
  <rect x="230" y="75" width="90" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="245" cy="95" r="3" fill="#64748b"/>
  <circle cx="245" cy="120" r="3" fill="#64748b"/>
  <circle cx="245" cy="145" r="3" fill="#64748b"/>
  <line x1="248" y1="95" x2="265" y2="113" stroke="#64748b" stroke-width="1.5"/>
  <line x1="248" y1="120" x2="265" y2="120" stroke="#64748b" stroke-width="1.5"/>
  <line x1="248" y1="145" x2="265" y2="127" stroke="#64748b" stroke-width="1.5"/>
  <rect x="262" y="110" width="20" height="20" rx="3" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <line x1="282" y1="120" x2="308" y2="120" stroke="#10b981" stroke-width="3"/>
  <polygon points="306,115 314,120 306,125" fill="#10b981"/>
  <text x="275" y="155" text-anchor="middle" class="label">A3: Converge</text>

  <!-- Row 2: Concept B -->
  <text x="350" y="65" class="title">B: The Bridge Span</text>
  <!-- B1 -->
  <rect x="350" y="75" width="90" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="365" y="88" width="8" height="55" rx="1" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="422" y="88" width="8" height="55" rx="1" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="365" y="98" width="65" height="8" rx="1" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <line x1="378" y1="100" x2="378" y2="104" stroke="#10b981" stroke-width="1"/>
  <line x1="388" y1="100" x2="388" y2="104" stroke="#10b981" stroke-width="1"/>
  <line x1="398" y1="100" x2="398" y2="104" stroke="#10b981" stroke-width="1"/>
  <line x1="408" y1="100" x2="408" y2="104" stroke="#10b981" stroke-width="1"/>
  <line x1="418" y1="100" x2="418" y2="104" stroke="#10b981" stroke-width="1"/>
  <text x="395" y="155" text-anchor="middle" class="label">B1: Beam</text>

  <!-- B2 -->
  <rect x="455" y="75" width="90" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <path d="M 475 95 L 468 95 L 468 145 L 475 145" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <path d="M 525 95 L 532 95 L 532 145 L 525 145" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <line x1="475" y1="110" x2="525" y2="110" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="475" y1="120" x2="525" y2="120" stroke="#10b981" stroke-width="2"/>
  <line x1="475" y1="130" x2="525" y2="130" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="500" y="155" text-anchor="middle" class="label">B2: Brackets</text>

  <!-- B3 -->
  <rect x="560" y="75" width="90" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="575" y="88" width="6" height="55" rx="1" fill="#e2e8f0"/>
  <rect x="634" y="88" width="6" height="55" rx="1" fill="#e2e8f0"/>
  <rect x="581" y="98" width="53" height="4" rx="1" fill="#10b981" opacity="0.6"/>
  <rect x="581" y="117" width="53" height="4" rx="1" fill="#10b981"/>
  <rect x="581" y="136" width="53" height="4" rx="1" fill="#10b981" opacity="0.6"/>
  <text x="605" y="155" text-anchor="middle" class="label">B3: Rungs</text>

  <!-- Row 3: Concept C -->
  <text x="680" y="65" class="title">C: The Ensemble Grid</text>
  <!-- C1 -->
  <rect x="680" y="75" width="90" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="695" y="105" width="12" height="30" rx="1" fill="#10b981" opacity="0.7"/>
  <rect x="714" y="95" width="12" height="40" rx="1" fill="#8b5cf6" opacity="0.7"/>
  <rect x="733" y="108" width="12" height="27" rx="1" fill="#f59e0b" opacity="0.7"/>
  <rect x="690" y="140" width="60" height="4" rx="1" fill="#e2e8f0"/>
  <text x="725" y="155" text-anchor="middle" class="label">C1: Bars</text>

  <!-- C2 -->
  <rect x="785" y="75" width="90" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="798" y="85" width="15" height="15" rx="1.5" fill="#334155"/>
  <rect x="817" y="85" width="15" height="15" rx="1.5" fill="#334155"/>
  <rect x="836" y="85" width="15" height="15" rx="1.5" fill="#334155"/>
  <rect x="798" y="104" width="15" height="15" rx="1.5" fill="#334155"/>
  <rect x="817" y="104" width="15" height="15" rx="1.5" fill="#334155"/>
  <rect x="836" y="104" width="15" height="15" rx="1.5" fill="#334155"/>
  <rect x="798" y="123" width="15" height="15" rx="1.5" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <rect x="817" y="123" width="15" height="15" rx="1.5" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <rect x="836" y="123" width="15" height="15" rx="1.5" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <text x="830" y="155" text-anchor="middle" class="label">C2: Grid</text>

  <!-- C3 mini at bottom -->
  <rect x="890" y="75" width="55" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="905" cy="90" r="5" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="917" cy="90" r="5" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="929" cy="90" r="5" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="905" y1="95" x2="917" y2="115" stroke="#64748b" stroke-width="1"/>
  <line x1="917" y1="95" x2="917" y2="115" stroke="#64748b" stroke-width="1"/>
  <line x1="929" y1="95" x2="917" y2="115" stroke="#64748b" stroke-width="1"/>
  <circle cx="917" cy="118" r="3" fill="#10b981"/>
  <rect x="900" y="130" width="35" height="7" rx="2" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <text x="917" y="155" text-anchor="middle" class="label">C3</text>

  <!-- Verdict row -->
  <line x1="20" y1="180" x2="940" y2="180" stroke="#334155" stroke-width="1"/>
  <text x="20" y="200" class="title">Assessment</text>

  <text x="65" y="220" text-anchor="middle" class="verdict">ADVANCE</text>
  <text x="170" y="220" text-anchor="middle" class="label">specific</text>
  <text x="275" y="220" text-anchor="middle" class="verdict">ADVANCE</text>
  <text x="395" y="220" text-anchor="middle" class="label">decent</text>
  <text x="500" y="220" text-anchor="middle" class="verdict">STRONG</text>
  <text x="605" y="220" text-anchor="middle" class="label">simple</text>
  <text x="725" y="220" text-anchor="middle" class="reject">TOO GENERIC</text>
  <text x="830" y="220" text-anchor="middle" class="verdict">ADVANCE</text>

  <!-- Notes -->
  <text x="20" y="250" class="label">A3 + B2 hybrid potential: convergence with bracket/code framing.</text>
  <text x="20" y="270" class="label">C2 has the strongest favicon potential — reads as a compact data widget at any size.</text>
  <text x="20" y="290" class="label">C1 killed: looks like any analytics dashboard icon. Not specific enough.</text>
  <text x="20" y="310" class="label">B3 is clean but says "ladder" or "equals sign" — not enough semantic load.</text>

  <!-- Final selections -->
  <line x1="20" y1="330" x2="940" y2="330" stroke="#334155" stroke-width="1"/>
  <text x="20" y="355" class="title">Advancing to First-Round Assets:</text>
  <text x="20" y="380" class="verdict">1. A3-B2 Hybrid: "The Join" — convergence + bracket framing</text>
  <text x="20" y="400" class="verdict">2. C2: "The Ensemble Grid" — 3x3 scoring matrix with consensus row</text>
  <text x="20" y="420" class="verdict">3. B1: "The Bridge Beam" — clean structural span (backup direction)</text>
</svg>
