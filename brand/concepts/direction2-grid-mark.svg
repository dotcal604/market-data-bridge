<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Direction 2: The Ensemble Grid — Mark only</title>
  <!-- 3x3 scoring matrix with consensus row highlighted -->

  <!-- Row 1: Feature/input cells -->
  <rect x="10" y="10" width="12" height="12" rx="1.5" fill="#334155"/>
  <rect x="26" y="10" width="12" height="12" rx="1.5" fill="#334155"/>
  <rect x="42" y="10" width="12" height="12" rx="1.5" fill="#334155"/>

  <!-- Row 2: Score cells -->
  <rect x="10" y="26" width="12" height="12" rx="1.5" fill="#334155"/>
  <rect x="26" y="26" width="12" height="12" rx="1.5" fill="#334155"/>
  <rect x="42" y="26" width="12" height="12" rx="1.5" fill="#334155"/>

  <!-- Row 3: Consensus/output cells — highlighted -->
  <rect x="10" y="42" width="12" height="12" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <rect x="26" y="42" width="12" height="12" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <rect x="42" y="42" width="12" height="12" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>

  <!-- Score indicators: model-colored dots in row 1 -->
  <circle cx="16" cy="16" r="2.5" fill="#10b981" opacity="0.7"/>
  <circle cx="32" cy="16" r="2.5" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="48" cy="16" r="2.5" fill="#f59e0b" opacity="0.7"/>

  <!-- Score values in row 2 (varying sizes = different scores) -->
  <circle cx="16" cy="32" r="3" fill="#10b981" opacity="0.5"/>
  <circle cx="32" cy="32" r="2.5" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="48" cy="32" r="3.5" fill="#f59e0b" opacity="0.5"/>

  <!-- Consensus dots in row 3 (unified emerald) -->
  <circle cx="16" cy="48" r="3" fill="#10b981"/>
  <circle cx="32" cy="48" r="3" fill="#10b981"/>
  <circle cx="48" cy="48" r="3" fill="#10b981"/>
</svg>
