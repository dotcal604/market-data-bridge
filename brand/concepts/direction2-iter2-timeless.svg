<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Direction 2, Iteration 2: Timeless — Minimal 3-column bridge grid</title>
  <!-- Stripped to essence: 3x3 grid where left column is muted (sources),
       center column has bridge stroke, right column is emerald (output).
       No arrows, no dots, no decoration. The structure speaks for itself.
       Reads left-to-right as "diverse inputs → bridge → unified output." -->

  <!-- Source column (muted, varied opacity) -->
  <rect x="7" y="7"  width="14" height="14" rx="2" fill="#475569"/>
  <rect x="7" y="25" width="14" height="14" rx="2" fill="#64748b"/>
  <rect x="7" y="43" width="14" height="14" rx="2" fill="#334155"/>

  <!-- Bridge column (outlined, processing) -->
  <rect x="25" y="7"  width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="25" y="25" width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="25" y="43" width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Output column (emerald — unified, enriched) -->
  <rect x="43" y="7"  width="14" height="14" rx="2.5" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <rect x="43" y="25" width="14" height="14" rx="2.5" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <rect x="43" y="43" width="14" height="14" rx="2.5" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
</svg>
