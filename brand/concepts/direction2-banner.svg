<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <title>Direction 2: The Ensemble Grid — README Banner</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg2)"/>

  <!-- Large grid mark on left -->
  <g transform="translate(80, 60) scale(3.5)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="40" width="16" height="16" rx="2.5" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="20" y="40" width="16" height="16" rx="2.5" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="40" y="40" width="16" height="16" rx="2.5" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="#10b981" opacity="0.7"/>
    <circle cx="28" cy="8" r="3" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="48" cy="8" r="3" fill="#f59e0b" opacity="0.7"/>
    <circle cx="8" cy="28" r="3.5" fill="#10b981" opacity="0.5"/>
    <circle cx="28" cy="28" r="3" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="48" cy="28" r="4" fill="#f59e0b" opacity="0.5"/>
    <circle cx="8" cy="48" r="3.5" fill="#10b981"/>
    <circle cx="28" cy="48" r="3.5" fill="#10b981"/>
    <circle cx="48" cy="48" r="3.5" fill="#10b981"/>
  </g>

  <!-- Title -->
  <text x="380" y="135" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace" font-size="42" fill="#e2e8f0" font-weight="600" letter-spacing="-1">market-data-bridge</text>

  <!-- Tagline -->
  <text x="380" y="175" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace" font-size="16" fill="#64748b" letter-spacing="0.5">Connect IBKR + Yahoo Finance to Claude &amp; ChatGPT</text>

  <!-- Feature pills -->
  <g transform="translate(380, 200)">
    <rect x="0" y="0" width="100" height="28" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
    <text x="50" y="18" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#10b981">56 MCP tools</text>

    <rect x="112" y="0" width="100" height="28" rx="4" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="162" y="18" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#8b5cf6">3-model eval</text>

    <rect x="224" y="0" width="110" height="28" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="279" y="18" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#f59e0b">REST + OpenAPI</text>

    <rect x="346" y="0" width="120" height="28" rx="4" fill="#64748b" fill-opacity="0.1" stroke="#64748b" stroke-width="1" stroke-opacity="0.4"/>
    <text x="406" y="18" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#94a3b8">trade execution</text>
  </g>

  <!-- Grid legend on right -->
  <g transform="translate(920, 90)">
    <circle cx="10" cy="8" r="5" fill="#10b981" opacity="0.7"/>
    <text x="24" y="12" font-family="monospace" font-size="12" fill="#64748b">Claude (Anthropic)</text>
    <circle cx="10" cy="32" r="5" fill="#8b5cf6" opacity="0.7"/>
    <text x="24" y="36" font-family="monospace" font-size="12" fill="#64748b">GPT-4o (OpenAI)</text>
    <circle cx="10" cy="56" r="5" fill="#f59e0b" opacity="0.7"/>
    <text x="24" y="60" font-family="monospace" font-size="12" fill="#64748b">Gemini (Google)</text>
    <line x1="0" y1="76" x2="180" y2="76" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="86" width="14" height="14" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <text x="24" y="97" font-family="monospace" font-size="12" fill="#10b981">Ensemble consensus</text>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="314" width="1280" height="6" fill="#10b981" opacity="0.6"/>
</svg>
