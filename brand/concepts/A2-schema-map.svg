<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <title>Concept A2: Schema Map — Columns bridged by horizontal bar</title>
  <rect width="120" height="120" fill="none"/>
  <!-- Three source columns -->
  <rect x="15" y="20" width="12" height="80" rx="2" fill="none" stroke="#64748b" stroke-width="2"/>
  <rect x="35" y="20" width="12" height="80" rx="2" fill="none" stroke="#64748b" stroke-width="2"/>
  <rect x="55" y="20" width="12" height="80" rx="2" fill="none" stroke="#64748b" stroke-width="2"/>
  <!-- Horizontal bridge bar -->
  <rect x="10" y="52" width="62" height="16" rx="2" fill="#10b981" opacity="0.2"/>
  <rect x="10" y="52" width="62" height="16" rx="2" fill="none" stroke="#10b981" stroke-width="2"/>
  <!-- Arrow to output -->
  <line x1="72" y1="60" x2="95" y2="60" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <polygon points="95,54 107,60 95,66" fill="#10b981"/>
  <!-- Output column (enriched) -->
  <rect x="93" y="20" width="16" height="80" rx="2" fill="none" stroke="#e2e8f0" stroke-width="2.5"/>
  <!-- Data rows in output -->
  <line x1="96" y1="35" x2="106" y2="35" stroke="#10b981" stroke-width="1.5"/>
  <line x1="96" y1="45" x2="106" y2="45" stroke="#10b981" stroke-width="1.5"/>
  <line x1="96" y1="55" x2="106" y2="55" stroke="#10b981" stroke-width="1.5"/>
  <line x1="96" y1="65" x2="106" y2="65" stroke="#10b981" stroke-width="1.5"/>
  <line x1="96" y1="75" x2="106" y2="75" stroke="#10b981" stroke-width="1.5"/>
  <line x1="96" y1="85" x2="106" y2="85" stroke="#10b981" stroke-width="1.5"/>
</svg>
