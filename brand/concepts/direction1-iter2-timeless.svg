<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Direction 1, Iteration 2: Timeless product mark — Pure grid bridge</title>
  <!-- Maximum simplification. The mark is a grid with a directional emphasis.
       Left column has three distinct cell fills (sources), right column unifies (bridge output).
       No arrows, no lines, no decoration. Just structure. -->

  <!-- 3x2 grid: 3 rows (sources) x 2 columns (input → output) -->
  <!-- Input column -->
  <rect x="10" y="10" width="17" height="12" rx="2" fill="#64748b" opacity="0.6"/>
  <rect x="10" y="26" width="17" height="12" rx="2" fill="#64748b" opacity="0.4"/>
  <rect x="10" y="42" width="17" height="12" rx="2" fill="#64748b" opacity="0.8"/>

  <!-- Output column (unified — all emerald) -->
  <rect x="31" y="10" width="23" height="12" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <rect x="31" y="26" width="23" height="12" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <rect x="31" y="42" width="23" height="12" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>

  <!-- Enrichment data dots in output cells -->
  <circle cx="39" cy="16" r="2" fill="#10b981"/>
  <circle cx="46" cy="16" r="2" fill="#10b981"/>
  <circle cx="39" cy="32" r="2" fill="#10b981"/>
  <circle cx="46" cy="32" r="2" fill="#10b981"/>
  <circle cx="39" cy="48" r="2" fill="#10b981"/>
  <circle cx="46" cy="48" r="2" fill="#10b981"/>
</svg>
