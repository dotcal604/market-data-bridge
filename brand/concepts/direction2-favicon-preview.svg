<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <title>Direction 2: Favicon size test — 16, 32, 48, 64</title>
  <rect width="400" height="120" fill="#0f172a" rx="4"/>
  <text x="20" y="20" font-family="monospace" font-size="10" fill="#64748b">Direction 2: The Ensemble Grid — Favicon sizes</text>

  <!-- 16x16 -->
  <rect x="20" y="35" width="16" height="16" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <g transform="translate(20, 35) scale(0.285)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="2"/>
    <rect x="20" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="2"/>
    <rect x="40" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="28" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">16px</text>

  <!-- 32x32 -->
  <rect x="70" y="27" width="32" height="32" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <g transform="translate(70, 27) scale(0.571)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="20" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="40" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="#10b981" opacity="0.7"/>
    <circle cx="28" cy="8" r="3" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="48" cy="8" r="3" fill="#f59e0b" opacity="0.7"/>
    <circle cx="8" cy="48" r="3" fill="#10b981"/>
    <circle cx="28" cy="48" r="3" fill="#10b981"/>
    <circle cx="48" cy="48" r="3" fill="#10b981"/>
  </g>
  <text x="86" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">32px</text>

  <!-- 48x48 -->
  <rect x="130" y="19" width="48" height="48" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <g transform="translate(130, 19) scale(0.857)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="20" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="40" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="#10b981" opacity="0.7"/>
    <circle cx="28" cy="8" r="3" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="48" cy="8" r="3" fill="#f59e0b" opacity="0.7"/>
    <circle cx="8" cy="28" r="3.5" fill="#10b981" opacity="0.5"/>
    <circle cx="28" cy="28" r="3" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="48" cy="28" r="4" fill="#f59e0b" opacity="0.5"/>
    <circle cx="8" cy="48" r="3.5" fill="#10b981"/>
    <circle cx="28" cy="48" r="3.5" fill="#10b981"/>
    <circle cx="48" cy="48" r="3.5" fill="#10b981"/>
  </g>
  <text x="154" y="84" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">48px</text>

  <!-- 64x64 -->
  <rect x="210" y="11" width="64" height="64" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <g transform="translate(214, 15) scale(1.04)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="0" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="20" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="40" y="20" width="16" height="16" rx="2" fill="#334155"/>
    <rect x="0" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="20" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <rect x="40" y="40" width="16" height="16" rx="2" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="#10b981" opacity="0.7"/>
    <circle cx="28" cy="8" r="3" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="48" cy="8" r="3" fill="#f59e0b" opacity="0.7"/>
    <circle cx="8" cy="28" r="3.5" fill="#10b981" opacity="0.5"/>
    <circle cx="28" cy="28" r="3" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="48" cy="28" r="4" fill="#f59e0b" opacity="0.5"/>
    <circle cx="8" cy="48" r="3.5" fill="#10b981"/>
    <circle cx="28" cy="48" r="3.5" fill="#10b981"/>
    <circle cx="48" cy="48" r="3.5" fill="#10b981"/>
  </g>
  <text x="242" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">64px</text>

  <!-- Assessment -->
  <text x="310" y="40" font-family="monospace" font-size="10" fill="#10b981">16px: ✓ 3x3 grid reads</text>
  <text x="310" y="55" font-family="monospace" font-size="10" fill="#10b981">32px: ✓ colors visible</text>
  <text x="310" y="75" font-family="monospace" font-size="10" fill="#10b981">48px+: ✓ full detail</text>
  <text x="310" y="95" font-family="monospace" font-size="10" fill="#94a3b8">Grid is inherently</text>
  <text x="310" y="108" font-family="monospace" font-size="10" fill="#94a3b8">pixel-aligned</text>
</svg>
