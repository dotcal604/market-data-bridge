<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <title>Concept C1: Ensemble Bars — Three scoring columns with consensus baseline</title>
  <rect width="120" height="120" fill="none"/>
  <!-- Three model scoring bars (varying heights = different scores) -->
  <rect x="25" y="35" width="16" height="50" rx="2" fill="#10b981" opacity="0.7"/>
  <rect x="52" y="25" width="16" height="60" rx="2" fill="#8b5cf6" opacity="0.7"/>
  <rect x="79" y="40" width="16" height="45" rx="2" fill="#f59e0b" opacity="0.7"/>
  <!-- Consensus baseline bar -->
  <rect x="20" y="90" width="80" height="6" rx="2" fill="#e2e8f0"/>
  <!-- Weighted ensemble indicator line -->
  <line x1="20" y1="52" x2="100" y2="52" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Label dots at top of each bar -->
  <circle cx="33" cy="30" r="3" fill="#10b981"/>
  <circle cx="60" cy="20" r="3" fill="#8b5cf6"/>
  <circle cx="87" cy="35" r="3" fill="#f59e0b"/>
</svg>
