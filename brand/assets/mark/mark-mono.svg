<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>market-data-bridge — Mark (Monochrome)</title>
  <desc>Iter 5: Flow connectors added in monochrome. Filled→outlined→filled-different with directional flow.</desc>

  <!-- Column 1: Sources (filled, uniform) -->
  <rect x="5" y="5"  width="14" height="14" rx="2" fill="#64748b"/>
  <rect x="5" y="25" width="14" height="14" rx="2" fill="#64748b"/>
  <rect x="5" y="45" width="14" height="14" rx="2" fill="#64748b"/>

  <!-- Flow connectors: source → bridge -->
  <line x1="20" y1="12" x2="24" y2="12" stroke="#64748b" stroke-width="1" opacity="0.35"/>
  <line x1="20" y1="32" x2="24" y2="32" stroke="#64748b" stroke-width="1" opacity="0.35"/>
  <line x1="20" y1="52" x2="24" y2="52" stroke="#64748b" stroke-width="1" opacity="0.35"/>

  <!-- Column 2: Bridge (outlined) -->
  <rect x="25" y="5"  width="14" height="14" rx="2" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <rect x="25" y="25" width="14" height="14" rx="2" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <rect x="25" y="45" width="14" height="14" rx="2" fill="none" stroke="#64748b" stroke-width="1.5"/>

  <!-- Flow connectors: bridge → output -->
  <line x1="40" y1="12" x2="44" y2="12" stroke="#64748b" stroke-width="1" opacity="0.35"/>
  <line x1="40" y1="32" x2="44" y2="32" stroke="#64748b" stroke-width="1" opacity="0.35"/>
  <line x1="40" y1="52" x2="44" y2="52" stroke="#64748b" stroke-width="1" opacity="0.35"/>

  <!-- Column 3: Output (filled lighter to differentiate from sources) -->
  <rect x="45" y="5"  width="14" height="14" rx="2.5" fill="#94a3b8" fill-opacity="0.3" stroke="#64748b" stroke-width="1.5"/>
  <rect x="45" y="25" width="14" height="14" rx="2.5" fill="#94a3b8" fill-opacity="0.3" stroke="#64748b" stroke-width="1.5"/>
  <rect x="45" y="45" width="14" height="14" rx="2.5" fill="#94a3b8" fill-opacity="0.3" stroke="#64748b" stroke-width="1.5"/>

  <!-- Enrichment indicators -->
  <circle cx="52" cy="12" r="3" fill="#64748b"/>
  <circle cx="52" cy="32" r="3" fill="#64748b"/>
  <circle cx="52" cy="52" r="3" fill="#64748b"/>
</svg>
