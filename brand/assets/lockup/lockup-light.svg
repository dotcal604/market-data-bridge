    <rect x="7" y="25" width="14" height="14" rx="2" fill="#94a3b8"/>
    <rect x="7" y="43" width="14" height="14" rx="2" fill="#e2e8f0"/>
    <!-- Bridge -->
    <rect x="25" y="7"  width="14" height="14" rx="2" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <rect x="25" y="25" width="14" height="14" rx="2" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <rect x="25" y="43" width="14" height="14" rx="2" fill="none" stroke="#64748b" stroke-width="1.5"/>
