  <!-- Wordmark -->
  <text x="80" y="37" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace" font-size="20" fill="#0f172a" font-weight="500" letter-spacing="-0.5">market-data-bridge</text>
  <text x="80" y="54" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace" font-size="10" fill="#64748b" letter-spacing="0.5">structured data layer for AI trading tools</text>
