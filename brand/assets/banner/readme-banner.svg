<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <title>market-data-bridge — README Banner</title>
  <!-- Iter 4: tighter composition, updated mark, flow arrows, corrected tool count -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bgGrad)"/>

  <!-- Subtle horizontal scan lines (data-in-transit feel) -->
  <g opacity="0.03">
    <rect x="0" y="40"  width="1280" height="1" fill="#10b981"/>
    <rect x="0" y="80"  width="1280" height="1" fill="#10b981"/>
    <rect x="0" y="120" width="1280" height="1" fill="#10b981"/>
    <rect x="0" y="160" width="1280" height="1" fill="#10b981"/>
    <rect x="0" y="200" width="1280" height="1" fill="#10b981"/>
    <rect x="0" y="240" width="1280" height="1" fill="#10b981"/>
    <rect x="0" y="280" width="1280" height="1" fill="#10b981"/>
  </g>

  <!-- Large mark (updated Iter 3 coordinates) -->
  <g transform="translate(80, 70) scale(2.8)">
    <!-- Sources (dark→mid→light) -->
    <rect x="5" y="5"  width="14" height="14" rx="2" fill="#334155"/>
    <rect x="5" y="25" width="14" height="14" rx="2" fill="#475569"/>
    <rect x="5" y="45" width="14" height="14" rx="2" fill="#64748b"/>
    <!-- Subtle flow arrows between columns -->
    <line x1="20" y1="12" x2="24" y2="12" stroke="#64748b" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="20" y1="32" x2="24" y2="32" stroke="#64748b" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="20" y1="52" x2="24" y2="52" stroke="#64748b" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- Bridge -->
    <rect x="25" y="5"  width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="25" y="25" width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="25" y="45" width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Flow arrows col2→col3 -->
    <line x1="40" y1="12" x2="44" y2="12" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="40" y1="32" x2="44" y2="32" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="40" y1="52" x2="44" y2="52" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- Output -->
    <rect x="45" y="5"  width="14" height="14" rx="2.5" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="1.5"/>
    <rect x="45" y="25" width="14" height="14" rx="2.5" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="1.5"/>
    <rect x="45" y="45" width="14" height="14" rx="2.5" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="52" cy="12" r="3" fill="#10b981"/>
    <circle cx="52" cy="32" r="3" fill="#10b981"/>
    <circle cx="52" cy="52" r="3" fill="#10b981"/>
  </g>

  <!-- Title -->
  <text x="290" y="130" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace" font-size="44" fill="#e2e8f0" font-weight="600" letter-spacing="-1">market-data-bridge</text>

  <!-- Tagline -->
  <text x="290" y="168" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace" font-size="16" fill="#64748b" letter-spacing="0.3">Connect IBKR + Yahoo Finance to Claude &amp; ChatGPT</text>

  <!-- Feature pills (corrected: 75 MCP tools) -->
  <g transform="translate(290, 195)">
    <rect x="0" y="0" width="100" height="26" rx="4" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
    <text x="50" y="17" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#10b981">75 MCP tools</text>

    <rect x="112" y="0" width="100" height="26" rx="4" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="162" y="17" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#8b5cf6">3-model eval</text>

    <rect x="224" y="0" width="110" height="26" rx="4" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="279" y="17" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#f59e0b">REST + OpenAPI</text>

    <rect x="346" y="0" width="120" height="26" rx="4" fill="#64748b" fill-opacity="0.08" stroke="#64748b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="406" y="17" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#94a3b8">trade execution</text>
  </g>

  <!-- Architecture diagram (higher opacity for readability) -->
  <g transform="translate(800, 80)" opacity="0.45">
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="12" fill="#64748b">IBKR TWS ───┐</text>
    <text x="0" y="20" font-family="'SF Mono', monospace" font-size="12" fill="#64748b">Yahoo Fin ──┼─→ Bridge ─→ MCP (Claude)</text>
    <text x="0" y="40" font-family="'SF Mono', monospace" font-size="12" fill="#64748b">CSV/XLSX ───┘           ─→ REST (ChatGPT)</text>
    <text x="0" y="72" font-family="'SF Mono', monospace" font-size="12" fill="#64748b">Eval: Claude · GPT-4o · Gemini</text>
    <text x="0" y="92" font-family="'SF Mono', monospace" font-size="12" fill="#64748b">14 features → ensemble → consensus</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="312" width="1280" height="8" fill="#10b981" opacity="0.5"/>
</svg>
