<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <title>market-data-bridge — Favicon 16x16</title>
  <!-- Maximum simplification for 16px: just the grid structure -->

  <rect width="16" height="16" rx="2" fill="#0f172a"/>

  <!-- Sources -->
  <rect x="1" y="1"  width="4" height="4" rx="0.5" fill="#64748b"/>
  <rect x="1" y="6"  width="4" height="4" rx="0.5" fill="#64748b"/>
  <rect x="1" y="11" width="4" height="4" rx="0.5" fill="#64748b"/>

  <!-- Bridge -->
  <rect x="6" y="1"  width="4" height="4" rx="0.5" fill="none" stroke="#94a3b8" stroke-width="0.75"/>
  <rect x="6" y="6"  width="4" height="4" rx="0.5" fill="none" stroke="#94a3b8" stroke-width="0.75"/>
  <rect x="6" y="11" width="4" height="4" rx="0.5" fill="none" stroke="#94a3b8" stroke-width="0.75"/>

  <!-- Output -->
  <rect x="11" y="1"  width="4" height="4" rx="0.5" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="0.75"/>
  <rect x="11" y="6"  width="4" height="4" rx="0.5" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="0.75"/>
  <rect x="11" y="11" width="4" height="4" rx="0.5" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="0.75"/>
</svg>
