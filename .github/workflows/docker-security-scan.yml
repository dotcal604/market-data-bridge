name: Docker Security Scan

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    # Weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.prod -t market-data-bridge:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: market-data-bridge:scan
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Comment on PR if vulnerabilities found
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sarif = JSON.parse(fs.readFileSync('trivy-results.sarif', 'utf8'));
            const results = sarif.runs[0].results || [];
            
            if (results.length > 0) {
              const critical = results.filter(r => r.level === 'error').length;
              const warnings = results.filter(r => r.level === 'warning').length;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `⚠️ **Trivy Scan Results**\n- Critical: ${critical}\n- Warnings: ${warnings}\n\nReview the Security tab for details.`
              });
            }
